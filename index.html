<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Library – Thầy Du Gia Văn</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --c-sky-top: #87ceeb;
            --c-sky-mid: #b0e2ff;
            --c-sky-bottom: #e0f6ff;
            --c-card: rgba(255, 253, 250, 0.95);
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-cute: 'Quicksand', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: #fff;
            overflow: hidden;
            color: #4a5568;
            /* Giúp cuộn trên mobile mượt hơn */
            touch-action: none;
        }

        /* ══ MASTER CONTAINER ══ */
        .master-scroll-container {
            height: 100vh;
            overflow-y: hidden;
            background: linear-gradient(to bottom, var(--c-sky-top) 0%, var(--c-sky-mid) 40%, var(--c-sky-bottom) 70%, #ffffff 100%);
            position: relative;
        }

        /* ══ NAVIGATION MENU (LEFT) ══ */
        .ghibli-nav {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 200;
        }

        .nav-trigger {
            width: 45px;
            height: 45px;
            background: var(--c-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid white;
            transition: 0.3s;
        }

        .nav-trigger:hover {
            transform: scale(1.1);
        }

        .nav-trigger span {
            width: 20px;
            height: 2px;
            background: #6fc2e9;
            position: relative;
        }

        .nav-trigger span::before,
        .nav-trigger span::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: inherit;
            left: 0;
        }

        .nav-trigger span::before {
            top: -6px;
        }

        .nav-trigger span::after {
            bottom: -6px;
        }

        .nav-content {
            position: absolute;
            top: 55px;
            left: 0;
            background: var(--c-card);
            border-radius: 20px;
            padding: 1.2rem;
            width: min(280px, 80vw);
            transform: scale(0.9);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid white;
        }

        .ghibli-nav:hover .nav-content {
            transform: scale(1);
            opacity: 1;
            pointer-events: all;
        }

        .nav-item {
            display: block;
            padding: 0.7rem 1rem;
            color: #4a5568;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 10px;
            transition: 0.2s;
            margin-bottom: 0.3rem;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #fff;
            color: #6fc2e9;
            padding-left: 1.3rem;
        }

        /* ══ SIDE CONTROLS (RIGHT) ══ */
        .side-controls {
            position: fixed;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-btn {
            width: 45px;
            height: 45px;
            background: var(--c-card);
            border: 1px solid white;
            border-radius: 12px;
            color: #6fc2e9;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* ══ SECTIONS ══ */
        .sections-wrapper {
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            height: 100%;
        }

        .hero-section {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .parallax-subject {
            position: absolute;
            font-family: var(--font-cute);
            font-size: clamp(3rem, 15vw, 10rem);
            font-weight: 800;
            color: #fff;
            opacity: 0.2;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
        }

        /* ══ INFO CARD (TRÁI TIM CỦA APP) ══ */
        .info-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 850px;
            max-height: 80vh;
            /* Giới hạn để không mất tiêu đề trên máy nhỏ */
            background: var(--c-card);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(135, 206, 235, 0.1);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        .card-header {
            padding: 1.8rem 2rem 0.8rem;
            flex-shrink: 0;
        }

        .card-body {
            padding: 0 2rem 2rem;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            /* Mượt trên iPhone */
        }

        /* Scrollbar xinh xắn */
        .card-body::-webkit-scrollbar {
            width: 5px;
        }

        .card-body::-webkit-scrollbar-thumb {
            background: #b0e2ff;
            border-radius: 10px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.6rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .tag-topic {
            background: #d1b2f2;
        }

        .tag-5 {
            background: #ffb7b2;
        }

        .tag-7 {
            background: #b2e2f2;
        }

        .tag-9 {
            background: #b2f2bb;
        }

        .tag-summary {
            background: #f2e2b2;
        }

        h2 {
            font-family: var(--font-cute);
            color: #2d3748;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            line-height: 1.3;
        }

        .content-text {
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            line-height: 1.6;
            color: #4a5568;
        }

        .logic-note {
            margin-top: 1.2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 18px;
            font-size: 0.9rem;
            border-left: 4px solid #b0e2ff;
            font-style: italic;
        }

        .ghibli-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .ghibli-table td {
            padding: 0.8rem;
            background: white;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .footer {
            position: fixed;
            bottom: 0.5rem;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: #718096;
            z-index: 100;
            opacity: 0.5;
        }

        /* ══ TỐI ƯU CHO MOBILE & TABLET ══ */
        @media (max-width: 1024px) {
            .info-card {
                max-width: 85%;
            }
        }

        @media (max-width: 600px) {
            .side-controls {
                right: 0.8rem;
                gap: 10px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .ghibli-nav {
                top: 1rem;
                left: 1rem;
            }

            .info-card {
                max-height: 75vh;
                border-radius: 25px;
                width: 92%;
            }

            .card-header {
                padding: 1.2rem 1.2rem 0.5rem;
            }

            .card-body {
                padding: 0 1.2rem 1.5rem;
            }

            .parallax-subject {
                opacity: 0.1;
                top: 15%;
            }

            /* Ẩn bớt bảng hoặc thu nhỏ nếu quá dài trên mobile */
            .ghibli-table td {
                font-size: 0.75rem;
                padding: 0.5rem;
            }
        }
    </style>
</head>

            {

                    title: "Chủ đề: Công nghệ giúp kết nối hay làm con người cô lập hơn?",

                createSection(topic.subjectText, 'topic', 'Topic', topic.mainTopic.title, topic.mainTopic.content, topic.mainTopic.logic);
                createSection(topic.subjectText, '5', 'Band 5.0', topic.band5.title, topic.band5.content, topic.band5.logic);
                createSection(topic.subjectText, '7', 'Band 7.0', topic.band7.title, topic.band7.content, topic.band7.logic);
                createSection(topic.subjectText, '9', 'Band 9.0', topic.band9.title, topic.band9.content, topic.band9.logic);
                createTableSection(topic.subjectText, topic.summaryTable);
            });

            totalSections = document.querySelectorAll('.hero-section').length;
            updateButtons();
        }

        function createSection(sub, type, tag, title, content, logic) {
            const sec = document.createElement('section');
            sec.className = 'hero-section';
            sec.innerHTML = `
                <div class="parallax-subject" data-speed="0.2">${sub}</div>
                <div class="info-card">
                    <div class="card-header"><span class="tag tag-${type}">${tag}</span><h2>${title}</h2></div>
                    <div class="card-body"><div class="content-text">${content}</div><div class="logic-note">${logic}</div></div>
                </div>`;
            wrapper.appendChild(sec);
        }

        function createTableSection(sub, rows) {
            const sec = document.createElement('section');
            sec.className = 'hero-section';
            let tableHtml = `<table class="ghibli-table">` +
                rows.map(r => `<tr><td><b>${r.label}</b></td><td>${r.b5}</td><td>${r.b7}</td><td>${r.b9}</td></tr>`).join('') +
                `</table>`;
            sec.innerHTML = `
                <div class="parallax-subject" data-speed="-0.2">REVIEW</div>
                <div class="info-card">
                    <div class="card-header"><span class="tag tag-summary">Comparison</span><h2>Tóm tắt</h2></div>
                    <div class="card-body">${tableHtml}</div>
                </div>`;
            wrapper.appendChild(sec);
        }

        // --- HÀM ĐIỀU HƯỚNG MỚI ---
        function moveSection(direction) {
            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < totalSections) {
                goToSection(newIndex);
            }
        }

        function goToSection(index) {
            currentIndex = index;
            wrapper.style.transform = `translateY(-${index * 100}vh)`;
            updateButtons();
        }

        function updateButtons() {
            // Vô hiệu hóa nút nếu đã ở đầu hoặc cuối trang
            document.getElementById('btn-up').disabled = (currentIndex === 0);
            document.getElementById('btn-down').disabled = (currentIndex === totalSections - 1);
        }

        // CHẶN LĂN CHUỘT KHI KHÔNG Ở TRONG CARD-BODY
        window.addEventListener('wheel', (e) => {
            const isInsideCardBody = e.target.closest('.card-body');
            if (!isInsideCardBody) {
                e.preventDefault();
                // Có thể thêm tính năng lăn chuột để chuyển trang tại đây nếu thầy muốn
                // if (e.deltaY > 0) moveSection(1); else moveSection(-1);
            }
        }, { passive: false });

        // Khởi chạy
        renderAll();

        // Parallax Effect
        function animate() {
            const subjects = document.querySelectorAll('.parallax-subject');
            subjects.forEach(el => {
                const rect = el.parentElement.getBoundingClientRect();
                const offset = rect.top;
                const speed = parseFloat(el.getAttribute('data-speed'));
                el.style.transform = `translateX(${offset * speed}px)`;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
